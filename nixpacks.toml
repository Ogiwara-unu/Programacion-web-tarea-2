[phases.install]
dependsOn = ["setup"]
cmds = ["composer install --no-dev --no-interaction --prefer-dist", "npm install"]

[phases.build]
dependsOn = ["install"]
cmds = ["npm run build", "php artisan optimize"]

[start]
cmd = "php artisan migrate --force && php artisan serve --host 0.0.0.0 --port $PORT"
